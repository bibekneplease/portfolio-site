    <style>
        :root { --indigo: #4f46e5; --indigo-dark: #3730a3; --indigo-light: #eef2ff; }
        * { box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: #f8f8fb; color: #1e1e2e; }
        h1, h2, h3 { font-family: 'DM Serif Display', serif; }
        html { scroll-behavior: smooth; }
        .nav-link { position: relative; color: #4b5563; font-weight: 500; font-size: 0.9rem; transition: color 0.2s; }
        .nav-link::after { content: ''; position: absolute; bottom: -3px; left: 0; width: 0; height: 2px; background: var(--indigo); transition: width 0.25s; }
        .nav-link:hover { color: var(--indigo); }
        .nav-link:hover::after { width: 100%; }
        .hero-overlay { background: linear-gradient(135deg, rgba(30,30,60,0.82) 0%, rgba(79,70,229,0.55) 100%); }
        .headshot { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; object-position: top center; border: 4px solid rgba(255,255,255,0.8); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .stat-value { font-family: 'DM Serif Display', serif; }
        .skill-tag { display: inline-block; background: var(--indigo-light); color: var(--indigo-dark); border-radius: 9999px; padding: 5px 14px; font-size: 0.82rem; font-weight: 500; margin: 3px; border: 1px solid #c7d2fe; transition: background 0.2s, color 0.2s; }
        .skill-tag:hover { background: var(--indigo); color: white; }
        .timeline-item { border-left: 3px solid #c7d2fe; padding-left: 1.75rem; position: relative; }
        .timeline-item::before { content: ''; width: 13px; height: 13px; background: var(--indigo); border: 3px solid white; border-radius: 50%; position: absolute; left: -8px; top: 8px; box-shadow: 0 0 0 2px #c7d2fe; }
        .section-title { font-size: 2.25rem; color: var(--indigo); text-align: center; margin-bottom: 2.5rem; }
        .company-badge { display: inline-flex; align-items: center; gap: 6px; background: white; border: 1px solid #e0e7ff; border-radius: 8px; padding: 6px 14px; font-size: 0.82rem; font-weight: 600; color: #374151; margin: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .cert-card { background: white; border-radius: 12px; padding: 1.25rem 1.5rem; display: flex; align-items: flex-start; gap: 1rem; border: 1px solid #e0e7ff; box-shadow: 0 1px 6px rgba(0,0,0,0.05); transition: box-shadow 0.2s; }
        .cert-card:hover { box-shadow: 0 4px 16px rgba(79,70,229,0.12); }
        .cert-group-title { font-size: 0.7rem; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; }

        /* Blog / Notes cards */
        .note-card { background: white; border-radius: 16px; border: 1px solid #e0e7ff; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.05); transition: box-shadow 0.25s, transform 0.25s; }
        .note-card:hover { box-shadow: 0 8px 24px rgba(79,70,229,0.12); transform: translateY(-3px); }
        .note-tag { display: inline-block; font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 9999px; }

        #mobile-menu { display: none; }
        @media (max-width: 768px) { #desktop-nav { display: none; } #mobile-toggle { display: block; } #mobile-menu.open { display: flex; } }
        @media (min-width: 769px) { #mobile-toggle { display: none; } }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeUp 0.7s ease both; }
        .delay-1 { animation-delay: 0.15s; }
        .delay-2 { animation-delay: 0.3s; }
        .delay-3 { animation-delay: 0.45s; }
    </style>
